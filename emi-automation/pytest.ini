[pytest]
testpaths = tests
pythonpath = .
addopts = -v --browser chromium --headed --html=reports/report.html --self-contained-html -p no:html-reporter -p no:reportportal -p no:browserstack_sdk
log_cli = true
log_cli_level = INFO
log_cli_format = %(levelname)s %(message)s
markers =
    smoke: core slider + formula checks
    schedule: payment schedule chart vs table validation
    export: PDF/Excel export validation
